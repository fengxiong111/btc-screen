<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#000000" />
<title>BTC</title>
<style>
  :root {
    --bg: #000;
    --ink: rgba(255,255,255,.92);
    --dur: 520ms;
    --ease: cubic-bezier(0.08,0.92,0.18,1);
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    padding-left: calc(env(safe-area-inset-left) + 5vw);
    padding-right: calc(env(safe-area-inset-right) + 5vw);
    padding-top: calc(env(safe-area-inset-top) + 4vh);
    padding-bottom: calc(env(safe-area-inset-bottom) + 4vh);
  }

  .price {
    color: var(--ink);
    font-weight: 700;
    line-height: 0.88;
    letter-spacing: -0.045em;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1, "lnum" 1;
    white-space: nowrap;
    will-change: font-size;
    overflow: visible;
  }

  .odometer {
    display: inline-flex;
    align-items: baseline;
    justify-content: center;
    gap: 0;
    white-space: nowrap;
  }

  .digit {
    position: relative;
    display: inline-block;
    width: 0.70em;
    height: 1em;
    line-height: 1em;
    overflow: hidden;
    vertical-align: baseline;
    padding: 0 0.02em;
    box-sizing: content-box;
  }

  .sep {
    width: 0.22em;
    display: inline-block;
    text-align: center;
    margin: 0 -0.04em;
    opacity: 0.86;
  }

  .track {
    position: absolute;
    left: 0;
    top: 0;
    will-change: transform;
    transform: translate3d(0, var(--y, 0em), 0);
    transition: transform var(--dur) var(--ease);
  }

  .cell {
    height: 1em;
    line-height: 1em;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-right: 0.03em;
    box-sizing: border-box;
  }

  @media (max-width: 430px) {
    .stage {
      padding-left: calc(env(safe-area-inset-left) + 7vw);
      padding-right: calc(env(safe-area-inset-right) + 8vw);
    }

    .price {
      letter-spacing: -0.040em;
    }
  }
</style>
</head>
<body>
  <div class="stage">
    <div id="price" class="price odometer" aria-label="BTC price"></div>
  </div>

<script>
(() => {
  const CACHE_KEY = "btc_price_cache_v1";
  const CACHE_TS_KEY = "btc_price_cache_ts_v1";
  const STALE_MS = 60 * 60 * 1000;
  const MIN_UPDATE_INTERVAL_MS = 5000;

  const priceEl = document.getElementById("price");
  const stageEl = document.querySelector(".stage");
  const fmt = new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 });

  const sources = [
    {
      name: "OKX",
      url: "https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT",
      parse: (json) => Number(json?.data?.[0]?.last)
    },
    {
      name: "Binance",
      url: "https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT",
      parse: (json) => Number(json?.price)
    },
    {
      name: "Coinbase",
      url: "https://api.coinbase.com/v2/prices/BTC-USD/spot",
      parse: (json) => Number(json?.data?.amount)
    }
  ];

  let inited = false;
  let currentTemplate = "";
  let lastShown = "";
  let fetchInFlight = false;

  function freezeOdometer(freeze = true) {
    priceEl.querySelectorAll(".track").forEach((track) => {
      track.style.transitionDuration = freeze ? "0ms" : "";
      track.style.transitionDelay = freeze ? "0ms" : "";
    });
  }

  function buildOdometer(text) {
    priceEl.innerHTML = "";
    for (const ch of text) {
      if (ch >= "0" && ch <= "9") {
        const digit = document.createElement("span");
        digit.className = "digit";
        digit.dataset.value = ch;

        const track = document.createElement("span");
        track.className = "track";

        for (let i = 0; i <= 9; i += 1) {
          const cell = document.createElement("span");
          cell.className = "cell";
          cell.textContent = String(i);
          track.appendChild(cell);
        }

        digit.appendChild(track);
        priceEl.appendChild(digit);
        track.style.setProperty("--y", `${-Number(ch)}em`);
      } else {
        const sep = document.createElement("span");
        sep.className = "sep";
        sep.textContent = ch;
        priceEl.appendChild(sep);
      }
    }
  }

  function fitPrice() {
    if (!priceEl.children.length) return;

    const stage = stageEl.getBoundingClientRect();
    const maxW = stage.width;
    const maxH = stage.height;

    let lo = 10;
    let hi = 900;
    while (hi - lo > 0.5) {
      const mid = (lo + hi) / 2;
      priceEl.style.fontSize = `${mid}px`;
      const rect = priceEl.getBoundingClientRect();
      const ok = rect.width <= maxW * 0.996 && rect.height <= maxH * 0.82;
      if (ok) lo = mid;
      else hi = mid;
    }
    priceEl.style.fontSize = `${lo}px`;
  }

  function rebuildAndFit(text, animate = true) {
    freezeOdometer(true);
    buildOdometer(text);
    fitPrice();
    if (animate) requestAnimationFrame(() => freezeOdometer(false));
    inited = true;
  }

  function setDigit(track, digit, instant) {
    if (instant) {
      track.style.transition = "none";
      track.style.setProperty("--y", `${-Number(digit)}em`);
      track.getBoundingClientRect();
      track.style.transition = "";
      return;
    }
    track.style.setProperty("--y", `${-Number(digit)}em`);
  }

  function setAllInstant(text) {
    if (currentTemplate !== text) {
      buildOdometer(text);
    }

    const nodes = Array.from(priceEl.children);
    let i = 0;
    for (const ch of text) {
      const node = nodes[i++];
      if (!node) break;
      if (node.classList.contains("digit")) {
        const track = node.querySelector(".track");
        node.dataset.value = ch;
        setDigit(track, ch, true);
      } else {
        node.textContent = ch;
      }
    }

    currentTemplate = text;
    lastShown = text;
  }

  function animateTo(text) {
    if (!inited || text.length !== currentTemplate.length) {
      rebuildAndFit(text, false);
      setAllInstant(text);
      return;
    }

    const nodes = Array.from(priceEl.children);
    let i = 0;
    for (const ch of text) {
      const node = nodes[i++];
      if (!node) break;
      if (node.classList.contains("digit")) {
        if (node.dataset.value !== ch) {
          node.dataset.value = ch;
          const track = node.querySelector(".track");
          setDigit(track, ch, false);
        }
      } else {
        node.textContent = ch;
      }
    }

    currentTemplate = text;
    lastShown = text;
  }

  function formatIntString(value) {
    const n = Number(value);
    if (!Number.isFinite(n) || n <= 0) return null;
    return fmt.format(Math.round(n));
  }

  function readCache() {
    try {
      const price = localStorage.getItem(CACHE_KEY);
      const ts = Number(localStorage.getItem(CACHE_TS_KEY));
      if (!price) return null;
      if (!Number.isFinite(ts)) return { price, stale: true };
      return { price, stale: (Date.now() - ts) > STALE_MS };
    } catch {
      return null;
    }
  }

  function writeCache(price) {
    localStorage.setItem(CACHE_KEY, price);
    localStorage.setItem(CACHE_TS_KEY, String(Date.now()));
  }

  async function fetchJson(url) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 4500);
    try {
      const response = await fetch(url, { cache: "no-store", mode: "cors", signal: controller.signal });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return await response.json();
    } finally {
      clearTimeout(timer);
    }
  }

  async function fetchPrice() {
    for (const source of sources) {
      try {
        const json = await fetchJson(source.url);
        const price = source.parse(json);
        const formatted = formatIntString(price);
        if (formatted) return formatted;
      } catch {
        // try next source
      }
    }
    throw new Error("all sources failed");
  }

  async function refreshPrice() {
    if (fetchInFlight) return;
    fetchInFlight = true;
    try {
      const next = await fetchPrice();
      writeCache(next);
      if (!lastShown) {
        rebuildAndFit(next, false);
        setAllInstant(next);
      } else if (next.length !== currentTemplate.length) {
        rebuildAndFit(next, false);
        setAllInstant(next);
      } else if (next !== lastShown) {
        animateTo(next);
      }
    } catch {
      // keep current display or cache
    } finally {
      fetchInFlight = false;
    }
  }

  function boot() {
    const cached = readCache();
    if (cached?.price) {
      rebuildAndFit(cached.price, false);
      setAllInstant(cached.price);
    }
    refreshPrice();
    setInterval(refreshPrice, MIN_UPDATE_INTERVAL_MS);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot, { once: true });
  } else {
    boot();
  }

  window.addEventListener("orientationchange", () => {
    if (inited) setTimeout(fitPrice, 80);
  }, { passive: true });

  window.addEventListener("pageshow", () => {
    if (inited) setTimeout(fitPrice, 80);
  }, { passive: true });
})();
</script>
</body>
</html>

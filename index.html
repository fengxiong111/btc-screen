<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#000000" />
<title>BTC</title>
<style>
  :root {
    --bg: #000;
    --ink: rgba(255,255,255,.92);
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    padding-left: calc(env(safe-area-inset-left) + 5vw);
    padding-right: calc(env(safe-area-inset-right) + 5vw);
    padding-top: calc(env(safe-area-inset-top) + 4vh);
    padding-bottom: calc(env(safe-area-inset-bottom) + 4vh);
  }

  .price {
    display: inline-block;
    color: var(--ink);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.045em;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1, "lnum" 1;
    white-space: nowrap;
    will-change: font-size;
    overflow: visible;
  }

  .measure {
    position: fixed;
    left: -9999px;
    top: -9999px;
    visibility: hidden;
    pointer-events: none;
  }

  @media (max-width: 430px) {
    .stage {
      padding-left: calc(env(safe-area-inset-left) + 7vw);
      padding-right: calc(env(safe-area-inset-right) + 8vw);
    }

    .price {
      letter-spacing: -0.040em;
    }
  }
</style>
</head>
<body>
  <div class="stage">
    <number-flow id="price" class="price" aria-label="BTC price"></number-flow>
  </div>
  <number-flow id="priceMeasure" class="price measure" aria-hidden="true"></number-flow>

<script type="module">
import "./vendor/number-flow.mjs";

(() => {
  const CACHE_KEY = "btc_price_cache_v1";
  const CACHE_TS_KEY = "btc_price_cache_ts_v1";
  const STALE_MS = 60 * 60 * 1000;
  const MIN_UPDATE_INTERVAL_MS = 1000;
  const FLOW_TIMING = Object.freeze({
    duration: 450,
    easing: "linear(0,.005,.019,.039,.066,.096,.129,.165,.202,.24,.278,.316,.354,.39,.426,.461,.494,.526,.557,.586,.614,.64,.665,.689,.711,.731,.751,.769,.786,.802,.817,.831,.844,.856,.867,.877,.887,.896,.904,.912,.919,.925,.931,.937,.942,.947,.951,.955,.959,.962,.965,.968,.971,.973,.976,.978,.98,.981,.983,.984,.986,.987,.988,.989,.99,.991,.992,.992,.993,.994,.994,.995,.995,.996,.996,.9963,.9967,.9969,.9972,.9975,.9977,.9979,.9981,.9982,.9984,.9985,.9987,.9988,.9989,1)"
  });

  const priceEl = document.getElementById("price");
  const measureEl = document.getElementById("priceMeasure");
  const stageEl = document.querySelector(".stage");
  const fmt = new Intl.NumberFormat("en-US", {
    maximumFractionDigits: 0,
    minimumFractionDigits: 0,
    useGrouping: true
  });

  const sources = [
    {
      name: "OKX",
      url: "https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT",
      parse: (json) => Number(json?.data?.[0]?.last)
    },
    {
      name: "Binance",
      url: "https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT",
      parse: (json) => Number(json?.price)
    },
    {
      name: "Coinbase",
      url: "https://api.coinbase.com/v2/prices/BTC-USD/spot",
      parse: (json) => Number(json?.data?.amount)
    }
  ];

  let inited = false;
  let lastShown = "";
  let fetchInFlight = false;

  function configureFlow(el, animated) {
    el.locales = "en-US";
    el.format = { maximumFractionDigits: 0, minimumFractionDigits: 0, useGrouping: true };
    el.trend = 0;
    el.transformTiming = FLOW_TIMING;
    el.animated = animated;
  }

  function normalizePrice(value) {
    const n = Number(value);
    if (!Number.isFinite(n) || n <= 0) return null;
    return fmt.format(Math.round(n));
  }

  function parsePriceText(text) {
    const n = Number(String(text).replace(/,/g, ""));
    return Number.isFinite(n) ? n : null;
  }

  function fitPrice(text) {
    const value = parsePriceText(text);
    if (!Number.isFinite(value)) return;

    configureFlow(measureEl, false);
    measureEl.update(value);

    const stage = stageEl.getBoundingClientRect();
    const maxW = stage.width;
    const maxH = stage.height;

    let lo = 10;
    let hi = 900;
    while (hi - lo > 0.5) {
      const mid = (lo + hi) / 2;
      measureEl.style.fontSize = `${mid}px`;
      const rect = measureEl.getBoundingClientRect();
      const ok = rect.width <= maxW * 0.996 && rect.height <= maxH * 0.82;
      if (ok) lo = mid;
      else hi = mid;
    }

    const size = `${lo}px`;
    priceEl.style.fontSize = size;
    measureEl.style.fontSize = size;
  }

  function renderPrice(text, instant = false) {
    const value = parsePriceText(text);
    if (!Number.isFinite(value)) return;

    const normalized = normalizePrice(value);
    if (!normalized) return;

    if (!inited || normalized.length !== lastShown.length) {
      fitPrice(normalized);
    }

    configureFlow(priceEl, !instant);
    priceEl.update(value);

    lastShown = normalized;
    inited = true;
  }

  function readCache() {
    try {
      const price = localStorage.getItem(CACHE_KEY);
      const ts = Number(localStorage.getItem(CACHE_TS_KEY));
      if (!price) return null;
      if (!Number.isFinite(ts)) return { price, stale: true };
      return { price, stale: (Date.now() - ts) > STALE_MS };
    } catch {
      return null;
    }
  }

  function writeCache(price) {
    localStorage.setItem(CACHE_KEY, price);
    localStorage.setItem(CACHE_TS_KEY, String(Date.now()));
  }

  async function fetchJson(url) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 4500);
    try {
      const response = await fetch(url, { cache: "no-store", mode: "cors", signal: controller.signal });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return await response.json();
    } finally {
      clearTimeout(timer);
    }
  }

  async function fetchPrice() {
    for (const source of sources) {
      try {
        const json = await fetchJson(source.url);
        const formatted = normalizePrice(source.parse(json));
        if (formatted) return formatted;
      } catch {
        // try next source
      }
    }
    throw new Error("all sources failed");
  }

  async function refreshPrice() {
    if (fetchInFlight) return;
    fetchInFlight = true;
    try {
      const next = await fetchPrice();
      writeCache(next);
      if (!lastShown) {
        renderPrice(next, true);
      } else if (next !== lastShown) {
        renderPrice(next, false);
      }
    } catch {
      // keep current display or cache
    } finally {
      fetchInFlight = false;
    }
  }

  function refitCurrent() {
    if (!inited || !lastShown) return;
    setTimeout(() => {
      fitPrice(lastShown);
      renderPrice(lastShown, true);
    }, 80);
  }

  function boot() {
    configureFlow(priceEl, false);
    configureFlow(measureEl, false);

    const cached = readCache();
    if (cached?.price) {
      renderPrice(cached.price, true);
    }

    refreshPrice();
    setInterval(refreshPrice, MIN_UPDATE_INTERVAL_MS);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot, { once: true });
  } else {
    boot();
  }

  window.addEventListener("orientationchange", refitCurrent, { passive: true });
  window.addEventListener("pageshow", refitCurrent, { passive: true });
})();
</script>
</body>
</html>
